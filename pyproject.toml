[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "ppathlib"
version = "0.1.0a0"
description = "Pathlib-style classes for local files and named remote storage."
readme = "README.md"
authors = [{ name = "hus" }]
license = { file = "LICENSE" }
keywords = [
  "pathlib",
  "remote storage",
  "s3",
  "azure blob storage",
  "google cloud storage",
]
classifiers = [
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
requires-python = ">=3.9"
dependencies = [
  "typing-extensions>4 ; python_version < '3.11'",
]

[project.optional-dependencies]
azure = ["azure-storage-blob>=12", "azure-storage-file-datalake>=12"]
gs = ["google-cloud-storage"]
s3 = ["boto3>=1.34.0"]
all = ["ppathlib[azure]", "ppathlib[gs]", "ppathlib[s3]"]

[tool.black]
line-length = 99
target-version = ["py39", "py310", "py311", "py312", "py313"]
include = "\\.pyi?$|\\.ipynb$"
extend-exclude = """
/(
    \\.git
  | \\.venv
  | \\.ipynb_checkpoints
)/
"""

[tool.mypy]
allow_redefinition = true
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "--cov=ppathlib --cov-report=term --cov-report=xml -n=auto --report-log reportlog.jsonl"
testpaths = ["tests"]

[tool.coverage.run]
source = ["ppathlib"]
omit = ["ppathlib/legacy/glob.py"]
